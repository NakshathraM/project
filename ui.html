<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitCoach · Build Better Every Day</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07091A;--surface:#0D1224;--card:#111827;--border:rgba(255,255,255,0.07);
  --accent:#7C3AED;--accent-l:#A78BFA;--accent-d:rgba(124,58,237,0.15);
  --green:#10B981;--green-d:rgba(16,185,129,0.15);
  --amber:#F59E0B;--amber-d:rgba(245,158,11,0.15);
  --red:#EF4444;--red-d:rgba(239,68,68,0.12);
  --text:#F9FAFB;--text2:#9CA3AF;--text3:#4B5563;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--text3);border-radius:99px}

/* Layout */
#app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;gap:3px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:6px}
.logo-icon{width:30px;height:30px;background:var(--accent-d);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.logo-name{font-size:13px;font-weight:800;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--text3);font-weight:500}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:1px solid transparent;transition:all .15s;background:none;width:100%;text-align:left;font-family:'Outfit',sans-serif}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.nav-btn.active{color:var(--accent-l);background:var(--accent-d);border-color:rgba(124,58,237,0.2)}
.sidebar-stat{margin-top:auto;padding:12px;background:var(--amber-d);border:1px solid rgba(245,158,11,0.2);border-radius:var(--rs)}
.ss-label{font-size:9px;color:var(--amber);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.ss-val{font-size:22px;font-weight:800;font-family:'Space Mono';color:var(--amber)}
.ss-sub{font-size:9px;color:var(--text3)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:20px 26px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.topbar-left h2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.topbar-left p{font-size:12px;color:var(--text2);margin-top:3px}
.content{flex:1;overflow-y:auto;padding:18px 26px 28px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:'Outfit',sans-serif}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:#6D28D9;box-shadow:0 0 20px rgba(124,58,237,.35)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{color:var(--text);background:rgba(255,255,255,.04)}
.btn-danger{background:var(--red-d);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed}

/* Inputs */
input,textarea,select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:10px 13px;font-size:13px;font-family:'Outfit',sans-serif;outline:none;width:100%;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:rgba(124,58,237,.5);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface)}
label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}

/* Grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}

/* Stat cards */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px}
.stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:10px}
.stat-val{font-size:23px;font-weight:800;font-family:'Space Mono';letter-spacing:-1px}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}

/* Habit cards */
.hcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;display:flex;flex-direction:column;gap:11px;transition:border-color .2s;position:relative}
.hcard.done{border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.025)}
.hcard:hover{border-color:rgba(124,58,237,.25)}
.hcard:hover .del-btn{opacity:1!important}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;opacity:0;padding:2px 4px;transition:opacity .15s;position:absolute;top:12px;right:12px}
.del-btn:hover{color:var(--red)}
.h-name{font-size:13px;font-weight:700}
.h-name.done{text-decoration:line-through;color:var(--green)}
.tag{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;margin-top:3px}
.pb-track{height:3px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.pb-fill{height:100%;border-radius:99px;transition:width .5s ease}
.stat-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text3)}
.complete-btn{width:100%;padding:9px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.complete-btn:hover{background:var(--accent-d);color:var(--accent-l);border-color:rgba(124,58,237,.3)}
.complete-btn.done{background:var(--green-d);color:var(--green);border-color:rgba(16,185,129,.25)}
.add-card{background:transparent;border:1px dashed var(--text3);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:196px;transition:all .15s;color:var(--text3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;width:100%}
.add-card:hover{border-color:var(--accent);color:var(--accent-l);background:var(--accent-d)}

/* Chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 118px)}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:11px;padding:2px 2px 4px;margin-bottom:10px}
.msg{display:flex;gap:9px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:76%;padding:9px 13px;border-radius:13px;font-size:13px;line-height:1.55}
.msg.assistant .msg-bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:3px;color:var(--text2)}
.msg.user .msg-bubble{background:var(--accent-d);border:1px solid rgba(124,58,237,.2);border-top-right-radius:3px;color:var(--text)}
.msg-av{width:27px;height:27px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg.assistant .msg-av{background:var(--accent-d)}
.msg.user .msg-av{background:var(--surface)}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0}
.typing span{width:6px;height:6px;background:var(--accent-l);border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.qprompts{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.qbtn{font-size:11px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:99px;color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.qbtn:hover{color:var(--accent-l);border-color:rgba(124,58,237,.3)}
.chat-row{display:flex;gap:8px;align-items:center}
.chat-row input{flex:1}
.err-box{display:flex;gap:9px;padding:11px 13px;background:var(--red-d);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);font-size:12px;color:var(--red);line-height:1.5}

/* Bar chart */
.bar-chart{display:flex;align-items:flex-end;gap:7px;height:80px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.bar{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.bar-lbl{font-size:10px;color:var(--text3)}

/* Heatmap */
.heatmap{display:flex;flex-wrap:wrap;gap:3px}
.hcell{width:14px;height:14px;border-radius:3px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:20px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;animation:su .2s ease}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.mt{font-size:14px;font-weight:700}.ms{font-size:10px;color:var(--text3);margin-top:2px}
.mb{padding:18px;display:flex;flex-direction:column;gap:14px}
.mf{display:flex;gap:8px;padding:0 18px 18px}
.xbtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:17px;padding:3px;border-radius:6px;transition:color .15s}
.xbtn:hover{color:var(--text)}

/* Emoji/color pickers */
.egrid{display:flex;flex-wrap:wrap;gap:5px;padding:9px;background:var(--surface);border-radius:var(--rs);border:1px solid var(--border)}
.ebtn{width:31px;height:31px;font-size:17px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;border:1px solid transparent;background:none;transition:all .1s}
.ebtn:hover,.ebtn.sel{background:var(--accent-d);border-color:rgba(124,58,237,.3)}
.cgrid{display:flex;gap:7px;flex-wrap:wrap}
.cdot{width:23px;height:23px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .1s;flex-shrink:0}
.cdot.sel{border-color:#fff;transform:scale(1.15)}
.dgrid{display:flex;gap:4px}
.dbtn{flex:1;padding:6px 3px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text3);font-family:'Outfit',sans-serif;transition:all .1s;text-align:center}

/* Insight */
.insight-box{background:linear-gradient(135deg,rgba(124,58,237,.1),rgba(124,58,237,.04));border:1px solid rgba(124,58,237,.2);border-radius:var(--r);padding:15px 17px;display:flex;gap:11px;align-items:flex-start}
.insight-text{font-size:13px;color:var(--text2);line-height:1.6}

/* Settings */
.ss{display:flex;flex-direction:column;gap:11px}
.ss-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}

/* Section title */
.stitle{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}

/* Progress ring */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.ring-content{position:relative;z-index:1}

/* Animations */
@keyframes fi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fi .22s ease forwards}

/* Ring hero */
.ring-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px}

/* Empty */
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:11px}
.empty-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12px;margin-bottom:18px}

/* Step indicator */
.steps{display:flex;gap:5px;margin-bottom:2px}
.step{height:3px;flex:1;border-radius:99px;background:var(--border);transition:background .3s}
.step.on{background:var(--accent)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const EMOJIS=['🧘','📚','🏃','💧','🥗','😴','🎯','✍️','🎵','🧠','💪','🌿','🙏','🚴','🏊','📝','🌅','🤸','🍎','☕']
const COLORS=['#7C3AED','#10B981','#F59E0B','#EF4444','#3B82F6','#EC4899','#06B6D4','#8B5CF6']
const CATS=['Health','Mindfulness','Learning','Fitness','Nutrition','Sleep','Productivity','Creative']
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
const QPROMPTS=['How am I doing this week?','Give me one tip to improve','Why do streaks matter?','Help me stay motivated']
const MODEL='claude-haiku-4-5-20251001'

// ── STATE ────────────────────────────────────────────────────────────────────
function load(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}

const DEFAULT_HABITS=[
  {id:'1',name:'Morning Meditation',description:'10 min of mindfulness to start the day',icon:'🧘',color:'#7C3AED',category:'Mindfulness',targetDays:[0,1,2,3,4,5,6],createdAt:new Date().toISOString()},
  {id:'2',name:'Read 30 Minutes',description:'Non-fiction or fiction — consistency is key',icon:'📚',color:'#10B981',category:'Learning',targetDays:[0,1,2,3,4,5,6],createdAt:new Date().toISOString()},
  {id:'3',name:'Exercise',description:'At least 30 minutes of physical activity',icon:'🏃',color:'#F59E0B',category:'Fitness',targetDays:[1,3,5],createdAt:new Date().toISOString()},
]

let S={
  view:'dashboard',
  habits:load('hc_habits')||DEFAULT_HABITS,
  completions:load('hc_completions')||{},
  chat:[{role:'assistant',content:"Hi! I'm your HabitCoach. I can see your habits and progress — ask me anything! 🎯"}],
  chatLoading:false,
  chatError:null,
  apiKey:localStorage.getItem('hc_key')||'',
  showModal:false,
  insight:null,
  insightLoading:false,
  form:{name:'',description:'',icon:'🎯',color:'#7C3AED',category:'Health',targetDays:[0,1,2,3,4,5,6]},
  step:1,
}

function set(patch){
  S={...S,...patch}
  localStorage.setItem('hc_habits',JSON.stringify(S.habits))
  localStorage.setItem('hc_completions',JSON.stringify(S.completions))
  render()
}

// ── DATE HELPERS ─────────────────────────────────────────────────────────────
const todayKey=()=>new Date().toISOString().slice(0,10)
function dayKey(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}
function fmtDate(k){return new Date(k+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}

function isDone(id,k=todayKey()){return !!(S.completions[k]&&S.completions[k][id])}
function getStreak(id){let s=0,i=isDone(id)?0:1;while(i<365){if(isDone(id,dayKey(i))){s++;i++}else break}return s}
function getRate(id,days=30){let n=0;for(let i=0;i<days;i++)if(isDone(id,dayKey(i)))n++;return Math.round(n/days*100)}
function todayHabits(){const d=new Date().getDay();return S.habits.filter(h=>h.targetDays.includes(d))}
function todayDone(){return todayHabits().filter(h=>isDone(h.id)).length}
function overallRate(){if(!S.habits.length)return 0;return Math.round(S.habits.reduce((a,h)=>a+getRate(h.id),0)/S.habits.length)}
function bestStreak(){return S.habits.reduce((m,h)=>Math.max(m,getStreak(h.id)),0)}
function weekData(){return Array.from({length:7},(_,i)=>{const k=dayKey(6-i);const d=new Date(k+'T00:00:00');const c=S.completions[k]||{};const n=Object.values(c).filter(Boolean).length;return{lbl:d.toLocaleDateString('en-US',{weekday:'short'}),n,total:S.habits.length,rate:S.habits.length?Math.round(n/S.habits.length*100):0}})}

// ── SVG RING ─────────────────────────────────────────────────────────────────
function ring(pct,size,sw,color,inner=''){
  const r=(size-sw)/2,circ=r*2*Math.PI,off=circ-(pct/100)*circ
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="${sw}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}"
        stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"
        style="transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)"/>
    </svg>
    <div class="ring-content">${inner}</div>
  </div>`
}

// ── ANTHROPIC API ─────────────────────────────────────────────────────────────
function sysPrompt(){
  const ths=todayHabits(),done=todayDone()
  const list=S.habits.map(h=>`  • ${h.name} (${h.category}): streak ${getStreak(h.id)}d, rate ${getRate(h.id)}%`).join('\n')
  return `You are HabitCoach, a concise and encouraging AI coach specializing in habit formation.

USER DATA
Today: ${done}/${ths.length} habits completed | Overall 30-day rate: ${overallRate()}%
Habits:\n${list||'  (none yet)'}

RULES: Be warm, direct, reference real habits. Under 100 words unless detail is needed. One tip when asked. Plain language.`
}

async function sendMsg(text){
  if(!text.trim()||S.chatLoading)return
  if(!S.apiKey){set({chatError:'Go to Settings and add your Anthropic API key first.'});return}
  const userMsg={role:'user',content:text}
  const history=[...S.chat.slice(1),userMsg]
  set({chat:[...S.chat,userMsg],chatLoading:true,chatError:null})
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:MODEL,max_tokens:512,system:sysPrompt(),messages:history.map(m=>({role:m.role,content:m.content}))})
    })
    const data=await res.json()
    if(!res.ok)throw new Error(data.error?.message||`API error ${res.status}`)
    const reply=data.content.filter(b=>b.type==='text').map(b=>b.text).join('')
    set({chat:[...S.chat,{role:'assistant',content:reply}],chatLoading:false})
  }catch(e){set({chatLoading:false,chatError:e.message})}
}

async function fetchInsight(){
  if(!S.apiKey||!S.habits.length)return
  set({insightLoading:true,insight:null})
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-allow-browser':'true'},
      body:JSON.stringify({model:MODEL,max_tokens:150,system:sysPrompt(),messages:[{role:'user',content:'Give me one short personalised motivational insight about my habits today. Max 2 sentences.'}]})
    })
    const data=await res.json()
    if(!res.ok)throw new Error(data.error?.message||'API error')
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('')
    set({insightLoading:false,insight:text})
  }catch{set({insightLoading:false})}
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function toggle(id){
  const k=todayKey(),day={...(S.completions[k]||{})}
  if(day[id])delete day[id];else day[id]=true
  set({completions:{...S.completions,[k]:day}})
}
function delHabit(id){if(!confirm('Delete this habit?'))return;set({habits:S.habits.filter(h=>h.id!==id)})}
function addHabit(){
  if(!S.form.name.trim())return
  set({habits:[...S.habits,{...S.form,id:Date.now().toString(),createdAt:new Date().toISOString()}],showModal:false,form:{name:'',description:'',icon:'🎯',color:'#7C3AED',category:'Health',targetDays:[0,1,2,3,4,5,6]},step:1})
}
function pf(p){set({form:{...S.form,...p}})}
function toggleDay(i){const td=S.form.targetDays;pf({targetDays:td.includes(i)?td.filter(d=>d!==i):[...td,i].sort()})}

// ── RENDERERS ─────────────────────────────────────────────────────────────────
function rDashboard(){
  const ths=todayHabits(),done=todayDone(),tot=ths.length
  const pct=tot?Math.round(done/tot*100):0
  const wk=weekData(),mx=Math.max(...wk.map(d=>d.total),1)
  const now=new Date(),h=now.getHours()
  const greet=h<12?'Good morning':h<17?'Good afternoon':'Good evening'
  const dstr=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
  const rColor=pct===100?'#10B981':'#7C3AED'
  return `<div class="ani" style="display:flex;flex-direction:column;gap:18px">
<div>
  <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.07em">${dstr}</div>
  <h1 style="font-size:25px;font-weight:800;letter-spacing:-.4px;margin-top:4px">${done===tot&&tot>0?'🎉 All habits complete!':greet+'!'}</h1>
  <p style="font-size:13px;color:var(--text2);margin-top:4px">${done===0?"Let's build some momentum today.":`${done} of ${tot} habits done today.`}</p>
</div>

${S.apiKey?`<div class="insight-box" id="ibox">
  <div style="font-size:20px;flex-shrink:0">✨</div>
  <div>
    <div style="font-size:9px;font-weight:700;color:var(--accent-l);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px">AI Insight</div>
    ${S.insightLoading?'<div style="font-size:13px;color:var(--text3)">Generating your personalised insight…</div>':
      S.insight?`<div class="insight-text">${S.insight}</div>`:
      `<button class="btn btn-g" onclick="fetchInsight()" style="font-size:12px;padding:5px 12px">✦ Generate insight</button>`}
  </div>
</div>`:`<div class="insight-box">
  <div style="font-size:20px;flex-shrink:0">🔑</div>
  <div class="insight-text">Add your <strong style="color:var(--accent-l)">Anthropic API key</strong> in <button onclick="set({view:'settings'})" style="background:none;border:none;cursor:pointer;color:var(--accent-l);font-weight:700;font-size:13px;font-family:'Outfit',sans-serif">Settings</button> to unlock AI coaching.</div>
</div>`}

<div class="g4">
  <div class="stat-card"><div class="stat-icon" style="background:var(--accent-d)">🎯</div><div class="stat-val" style="color:var(--accent-l)">${pct}%</div><div class="stat-lbl">Today's progress</div></div>
  <div class="stat-card"><div class="stat-icon" style="background:var(--green-d)">✅</div><div class="stat-val" style="color:#34D399">${overallRate()}%</div><div class="stat-lbl">Monthly rate</div></div>
  <div class="stat-card"><div class="stat-icon" style="background:var(--amber-d)">🔥</div><div class="stat-val" style="color:var(--amber)">${bestStreak()}d</div><div class="stat-lbl">Best streak</div></div>
  <div class="stat-card"><div class="stat-icon" style="background:rgba(59,130,246,.15)">📊</div><div class="stat-val" style="color:#60A5FA">${S.habits.length}</div><div class="stat-lbl">Active habits</div></div>
</div>

<div class="g2">
  <div class="card ring-hero">
    ${ring(pct,118,9,rColor,`<div style="text-align:center"><div style="font-size:25px;font-weight:800;font-family:'Space Mono';color:var(--text)">${pct}%</div><div style="font-size:10px;color:var(--text3)">today</div></div>`)}
    <div style="font-size:12px;color:var(--text2);margin-top:9px">${pct===100?'Perfect day! 🌟':`${tot-done} remaining`}</div>
  </div>
  <div class="card"><div class="stitle">7-Day Completion</div>
    <div class="bar-chart">
      ${wk.map(d=>`<div class="bar-col"><div class="bar" style="height:${Math.max(4,(d.n/mx)*72)}px;background:${d.n>0?'#7C3AED':'rgba(255,255,255,.05)'}"></div><div class="bar-lbl">${d.lbl[0]}</div></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:10px">
      ${wk.map(d=>`<div style="font-size:9px;color:var(--text3);text-align:center;flex:1">${d.rate}%</div>`).join('')}
    </div>
  </div>
</div>

<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
    <div class="stitle" style="margin-bottom:0">Today's Habits</div>
    <button onclick="set({view:'habits'})" style="font-size:11px;color:var(--accent-l);background:none;border:none;cursor:pointer">View all →</button>
  </div>
  ${ths.length===0?'<p style="font-size:13px;color:var(--text3)">No habits scheduled today.</p>':
    ths.map(h=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:7px">
      <span style="font-size:17px">${h.icon}</span>
      <span style="font-size:13px;font-weight:500;flex:1">${h.name}</span>
      <span class="tag" style="background:${h.color}20;color:${h.color}">${h.category}</span>
      ${isDone(h.id)?'<span style="color:var(--green)">✓</span>':''}
    </div>`).join('')}
</div></div>`
}

function rHabits(){
  return `<div class="ani"><div class="g3">
    ${S.habits.map(h=>{
      const done=isDone(h.id),str=getStreak(h.id),rate=getRate(h.id)
      const rc=rate>=70?'#10B981':rate>=40?'#F59E0B':'#EF4444'
      return `<div class="hcard ${done?'done':''}">
        <button class="del-btn" onclick="delHabit('${h.id}')" title="Delete">✕</button>
        <div style="display:flex;align-items:center;gap:10px">
          ${ring(done?100:rate,46,4,done?'#10B981':h.color,`<span style="font-size:17px">${h.icon}</span>`)}
          <div><div class="h-name ${done?'done':''}">${h.name}</div><div class="tag" style="background:${h.color}20;color:${h.color}">${h.category}</div></div>
        </div>
        <div style="font-size:11px;color:var(--text3);line-height:1.5">${h.description||'No description'}</div>
        <div class="pb-track"><div class="pb-fill" style="width:${rate}%;background:${rc}"></div></div>
        <div class="stat-row">
          <span style="color:${str>0?'var(--amber)':'var(--text3)'};font-family:'Space Mono';font-size:11px">🔥 ${str}d streak</span>
          <span style="color:${rc};font-family:'Space Mono';font-size:11px">${rate}% rate</span>
        </div>
        <button class="complete-btn ${done?'done':''}" onclick="toggle('${h.id}')">${done?'✓ Completed today!':'○ Mark complete'}</button>
      </div>`}).join('')}
    <button class="add-card" onclick="set({showModal:true,step:1})">
      <span style="font-size:26px">+</span><span>Add new habit</span>
    </button>
  </div></div>`
}

function rCoach(){
  return `<div class="ani chat-wrap">
    <div class="qprompts">${QPROMPTS.map(p=>`<button class="qbtn" onclick="qsend('${p.replace(/'/g,"\\'")}')">${p}</button>`).join('')}</div>
    <div class="chat-msgs" id="cmsgs">
      ${S.chat.map(m=>`<div class="msg ${m.role}">
        <div class="msg-av">${m.role==='assistant'?'🤖':'👤'}</div>
        <div class="msg-bubble">${m.content.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
      </div>`).join('')}
      ${S.chatLoading?`<div class="msg assistant"><div class="msg-av">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`:''}
      ${S.chatError?`<div class="err-box">⚠️ ${S.chatError}</div>`:''}
    </div>
    <div class="chat-row">
      <input id="cinput" type="text" placeholder="${S.apiKey?'Ask your coach anything…':'Add API key in Settings first'}" ${!S.apiKey?'disabled':''} onkeydown="if(event.key==='Enter'){hsend();event.preventDefault()}"/>
      <button class="btn btn-p" onclick="hsend()" ${S.chatLoading||!S.apiKey?'disabled':''} style="padding:10px 15px;font-size:16px">↑</button>
    </div>
  </div>`
}

function rAnalytics(){
  const wk=weekData(),mx=Math.max(...wk.map(d=>d.total),1)
  return `<div class="ani" style="display:flex;flex-direction:column;gap:18px">
    <div class="card">
      <div class="stitle">Per-Habit Completion Rate (30 days)</div>
      ${!S.habits.length?'<p style="font-size:13px;color:var(--text3)">No habits yet.</p>':
        S.habits.map(h=>{const r=getRate(h.id);const rc=r>=70?'#10B981':r>=40?'#F59E0B':'#EF4444';return`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:13px">
          <span style="font-size:17px;flex-shrink:0">${h.icon}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:12px;font-weight:600;color:var(--text2)">${h.name}</span>
              <span style="font-size:11px;font-family:'Space Mono';color:${rc}">${r}%</span>
            </div>
            <div class="pb-track" style="height:5px"><div class="pb-fill" style="width:${r}%;background:${h.color}"></div></div>
          </div>
        </div>`}).join('')}
    </div>
    <div class="g2">
      <div class="card">
        <div class="stitle">Weekly Completions</div>
        <div class="bar-chart" style="height:96px">
          ${wk.map(d=>`<div class="bar-col">
            <div style="font-size:9px;color:var(--text3);margin-bottom:2px">${d.n}</div>
            <div class="bar" style="height:${Math.max(4,(d.n/mx)*76)}px;background:${d.n>0?'#7C3AED':'rgba(255,255,255,.05)'}"></div>
            <div class="bar-lbl">${d.lbl}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="stitle">Streak Leaderboard</div>
        ${[...S.habits].sort((a,b)=>getStreak(b.id)-getStreak(a.id)).map((h,i)=>`
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">
            <span style="font-size:12px;font-family:'Space Mono';color:var(--text3);width:15px">${i+1}</span>
            <span style="font-size:15px">${h.icon}</span>
            <span style="font-size:12px;font-weight:600;flex:1;color:var(--text2)">${h.name}</span>
            <span style="font-size:11px;color:var(--amber);font-family:'Space Mono'">🔥 ${getStreak(h.id)}d</span>
          </div>`).join('')||'<p style="font-size:13px;color:var(--text3)">No habits yet.</p>'}
      </div>
    </div>
    <div class="card">
      <div class="stitle">Completion Heatmap — Last 5 Weeks</div>
      ${!S.habits.length?'<p style="font-size:13px;color:var(--text3)">No habits yet.</p>':`
        <select id="hsel" onchange="drawHeat(this.value)" style="width:auto;margin-bottom:13px">
          ${S.habits.map(h=>`<option value="${h.id}">${h.name}</option>`).join('')}
        </select>
        <div id="hmap"></div>`}
    </div>
  </div>`
}

function drawHeat(id){
  const el=document.getElementById('hmap');if(!el)return
  const h=S.habits.find(x=>x.id===id);if(!h)return
  el.innerHTML=`<div class="heatmap">${Array.from({length:35},(_,i)=>{
    const k=dayKey(34-i);const done=isDone(id,k)
    return`<div class="hcell" title="${fmtDate(k)}: ${done?'done':'missed'}" style="background:${done?h.color:'rgba(255,255,255,.05)'}"></div>`
  }).join('')}</div>
  <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
    <div style="width:12px;height:12px;border-radius:3px;background:rgba(255,255,255,.05)"></div><span style="font-size:10px;color:var(--text3)">Missed</span>
    <div style="width:12px;height:12px;border-radius:3px;background:${h.color};margin-left:6px"></div><span style="font-size:10px;color:var(--text3)">Done</span>
  </div>`
}

function rSettings(){
  return`<div class="ani" style="display:flex;flex-direction:column;gap:16px;max-width:460px">
    <div class="card ss">
      <div class="ss-title">🔑 Anthropic API Key</div>
      <p style="font-size:12px;color:var(--text3)">Required for the AI coach. Free at <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent-l)">console.anthropic.com</a> → API Keys. Stored only in your browser.</p>
      <div style="display:flex;gap:8px">
        <input type="password" id="kfield" placeholder="sk-ant-api03-..." value="${S.apiKey}" style="flex:1;font-family:'Space Mono';font-size:12px"/>
        <button class="btn btn-p" onclick="saveKey()" style="flex-shrink:0">Save</button>
      </div>
      ${S.apiKey?'<p style="font-size:11px;color:var(--green)">✓ API key is saved</p>':'<p style="font-size:11px;color:var(--text3)">No key saved yet</p>'}
    </div>
    <div class="card ss">
      <div class="ss-title">📦 Your Data</div>
      <p style="font-size:12px;color:var(--text3)">Everything is stored in your browser. Export a backup or reset to start fresh.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-g" onclick="exportData()" style="font-size:12px">⬇ Export backup</button>
        <button class="btn btn-danger" onclick="clearData()" style="font-size:12px">🗑 Reset all data</button>
      </div>
    </div>
    <div class="card ss">
      <div class="ss-title">ℹ About</div>
      <p style="font-size:12px;color:var(--text3)">HabitCoach · Single-file app. Uses <strong style="color:var(--text2)">claude-haiku-4-5</strong>. API calls go directly from your browser to Anthropic.</p>
    </div>
  </div>`
}

function rModal(){
  if(!S.showModal)return''
  const f=S.form
  if(S.step===1)return`<div class="overlay" onclick="oclose(event)"><div class="modal">
    <div class="mh">
      <div><div class="mt">Add New Habit</div><div class="ms">Step 1 of 2 · Details</div><div class="steps" style="margin-top:6px"><div class="step on"></div><div class="step"></div></div></div>
      <button class="xbtn" onclick="set({showModal:false})">✕</button>
    </div>
    <div class="mb">
      <div><label>Habit Name</label><input id="hname" type="text" placeholder="e.g. Morning Meditation" value="${f.name}" oninput="pf({name:this.value})" autofocus/></div>
      <div><label>Description</label><textarea placeholder="What does it involve?" oninput="pf({description:this.value})" style="height:64px;resize:none">${f.description}</textarea></div>
      <div><label>Icon</label><div class="egrid">${EMOJIS.map(e=>`<button class="ebtn ${f.icon===e?'sel':''}" onclick="pf({icon:'${e}'})">${e}</button>`).join('')}</div></div>
      <div><label>Color</label><div class="cgrid">${COLORS.map(c=>`<div class="cdot ${f.color===c?'sel':''}" style="background:${c}" onclick="pf({color:'${c}'})"></div>`).join('')}</div></div>
      <div><label>Category</label><select onchange="pf({category:this.value})">${CATS.map(c=>`<option value="${c}" ${f.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="mf"><button class="btn btn-p" style="flex:1;justify-content:center" onclick="set({step:2})" ${!f.name.trim()?'disabled':''}>Continue →</button></div>
  </div></div>`

  return`<div class="overlay" onclick="oclose(event)"><div class="modal">
    <div class="mh">
      <div><div class="mt">Add New Habit</div><div class="ms">Step 2 of 2 · Schedule</div><div class="steps" style="margin-top:6px"><div class="step on"></div><div class="step on"></div></div></div>
      <button class="xbtn" onclick="set({showModal:false})">✕</button>
    </div>
    <div class="mb">
      <div style="display:flex;align-items:center;gap:11px;padding:11px;background:var(--surface);border-radius:var(--rs);border:1px solid var(--border)">
        <span style="font-size:26px">${f.icon}</span>
        <div><div style="font-weight:700;font-size:13px">${f.name}</div><div class="tag" style="background:${f.color}20;color:${f.color};margin-top:3px">${f.category}</div></div>
        <div style="margin-left:auto;width:11px;height:11px;border-radius:50%;background:${f.color}"></div>
      </div>
      <div><label>Active Days</label><div class="dgrid">
        ${DAYS.map((d,i)=>`<button class="dbtn ${f.targetDays.includes(i)?'selected':''}"
          style="${f.targetDays.includes(i)?`background:${f.color}25;border-color:${f.color}60;color:#fff`:''}"
          onclick="toggleDay(${i})">${d}</button>`).join('')}
      </div></div>
    </div>
    <div class="mf">
      <button class="btn btn-g" onclick="set({step:1})" style="flex:1;justify-content:center">← Back</button>
      <button class="btn btn-p" onclick="addHabit()" style="flex:1;justify-content:center" ${f.targetDays.length===0?'disabled':''}>+ Add Habit</button>
    </div>
  </div></div>`
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const views={
    dashboard:{title:null,sub:null,fn:rDashboard},
    habits:{title:'My Habits',sub:`${S.habits.length} habits · ${todayDone()}/${todayHabits().length} done today`,fn:rHabits},
    coach:{title:'AI Coach',sub:'Powered by Claude · knows your habit data',fn:rCoach},
    analytics:{title:'Analytics',sub:'Your habit patterns & trends',fn:rAnalytics},
    settings:{title:'Settings',sub:'Configure and manage your data',fn:rSettings},
  }
  const v=views[S.view]

  document.getElementById('app').innerHTML=`
<div style="display:flex;height:100vh">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div><div class="logo-name">HabitCoach</div><div class="logo-sub">AI-Powered Growth</div></div>
    </div>
    ${[['dashboard','🏠','Dashboard'],['habits','✅','My Habits'],['analytics','📊','Analytics'],['coach','🤖','AI Coach'],['settings','⚙️','Settings']].map(([id,ic,lb])=>
      `<button class="nav-btn ${S.view===id?'active':''}" onclick="set({view:'${id}'})">${ic} ${lb}</button>`).join('')}
    <div class="sidebar-stat">
      <div class="ss-label">🔥 Best Streak</div>
      <div class="ss-val">${bestStreak()}d</div>
      <div class="ss-sub">${overallRate()}% monthly rate</div>
    </div>
  </aside>

  <main class="main">
    ${v.title?`<div class="topbar">
      <div class="topbar-left"><h2>${v.title}</h2><p>${v.sub}</p></div>
      ${S.view==='habits'?`<button class="btn btn-p" onclick="set({showModal:true,step:1})">+ Add Habit</button>`:''}
    </div>`:''}
    <div class="content">${v.fn()}</div>
  </main>
</div>
${rModal()}`

  // Post-render
  if(S.view==='analytics'&&S.habits.length){const hs=document.getElementById('hsel');if(hs)drawHeat(hs.value)}
  if(S.view==='coach'){const c=document.getElementById('cmsgs');if(c)c.scrollTop=c.scrollHeight}
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
function hsend(){const i=document.getElementById('cinput');if(i){sendMsg(i.value);i.value=''}}
function qsend(t){sendMsg(t)}
function oclose(e){if(e.target===e.currentTarget)set({showModal:false})}
function saveKey(){const v=document.getElementById('kfield')?.value.trim()||'';localStorage.setItem('hc_key',v);set({apiKey:v,insight:null})}
function exportData(){
  const data={habits:S.habits,completions:S.completions,exportedAt:new Date().toISOString()}
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'})),download:`habitcoach-${todayKey()}.json`})
  a.click()
}
function clearData(){if(!confirm('Delete ALL habits and history? Cannot be undone.'))return;localStorage.clear();location.reload()}

// ── INIT ──────────────────────────────────────────────────────────────────────
render()
</script>
</body>
</html>
